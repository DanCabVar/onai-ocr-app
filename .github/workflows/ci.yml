name: CI - Lint & Build Check

on:
  pull_request:
    branches: [dev, qa, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────
  # Backend (NestJS) - Lint + Build
  # ─────────────────────────────────────
  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─────────────────────────────────────
  # Frontend (Next.js) - Lint + Build
  # ─────────────────────────────────────
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─────────────────────────────────────
  # Processor (Python) - Lint + Type Check
  # ─────────────────────────────────────
  processor:
    name: Processor - Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: processor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

  # ─────────────────────────────────────
  # Docker Build Check (no push)
  # ─────────────────────────────────────
  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend, processor]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
